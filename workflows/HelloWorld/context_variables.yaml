definitions:
- name: user_name
  type: string
  description: The name provided by the user during the greeting conversation.
  source:
    type: runtime
    default: null

- name: greeting
  type: string
  description: The full greeting message generated by the greet tool.
  source:
    type: runtime
    default: null

- name: greeting_complete
  type: boolean
  description: Set to true once the greet tool has been called successfully.
  source:
    type: runtime
    default: false
