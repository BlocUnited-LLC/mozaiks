services:
  # ---------------------------------------------------------------------------
  # Keycloak Postgres — user/realm/session persistence
  # ---------------------------------------------------------------------------
  keycloak-db:
    image: postgres:16-alpine
    container_name: mozaiksai-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - mozaiksai_keycloak_db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak — Identity provider (OIDC / PKCE)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: mozaiksai-keycloak
    command: start --import-realm --optimized
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; timeout 1 cat <&3 | grep -q '200\\|UP'"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MongoDB - Chat persistence and session storage
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: mozaiksai-mongo
    ports:
      - "27017:27017"
    volumes:
      - mozaiksai_mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # MozaiksAI Runtime - Workflow execution engine
  # ---------------------------------------------------------------------------
  runtime:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    image: mozaiks/runtime:latest
    container_name: mozaiksai-runtime
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    environment:
      # MongoDB connection (uses compose network)
      MONGO_URI: "mongodb://mongo:27017/MozaiksAI"
      # Auth
      AUTH_ENABLED: "true"
      MOZAIKS_OIDC_AUTHORITY: http://keycloak:8080/realms/mozaiks
      # Runtime settings
      AG2_RUNTIME_LOGGING: "sqlite"
      LOGS_BASE_DIR: /app/logs
      DOCKERIZED: "true"
      # Multi-tenant settings (override in .env for production)
      # DEFAULT_APP_ID: "your-app-id"
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      # Persist logs outside container
      - ../../logs:/app/logs
      # Mount workflows for hot-reload (dev only, remove in prod)
      # - ../../workflows:/app/workflows:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mozaiksai_mongo_data:
  mozaiksai_keycloak_db:
