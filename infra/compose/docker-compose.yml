services:
  # ---------------------------------------------------------------------------
  # Keycloak Postgres — user/realm/session persistence
  # ---------------------------------------------------------------------------
  keycloak-db:
    image: postgres:16-alpine
    container_name: mozaiksai-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - mozaiksai_keycloak_db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak — Identity provider (OIDC / PKCE)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: mozaiksai-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; timeout 1 cat <&3 | grep -q '200\\|UP'"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 30s

  mongo:
    image: mongo:7
    container_name: mozaiksai-mongo
    ports:
      - "27017:27017"
    volumes:
      - mozaiksai_mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ../..    # repo root
      dockerfile: infra/docker/Dockerfile
    image: mozaiksai-app:latest
    pull_policy: never
    container_name: mozaiksai-app
    command: >
      watchmedo auto-restart 
      --patterns="*.py" 
      --recursive -- 
      python run_server.py
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
      #433: "443:443"   # Uncomment if using HTTPS
    environment:
      # Keycloak auth — enabled when Keycloak is healthy.
      # Set AUTH_ENABLED=false in .env to skip JWT validation during dev.
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      MOZAIKS_OIDC_AUTHORITY: http://keycloak:8080/realms/mozaiks
      AG2_RUNTIME_LOGGING: "sqlite"
      LOGS_BASE_DIR: /app/logs/logs
      DOCKERIZED: "true"
      # In docker mode, use the compose-network mongo service.
      # Override by setting MONGO_URI in the repo-root .env (or your shell env).
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/MozaiksAI}
      # AZURE_* still supplied via env_file
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ../../:/app
      - ../../logs/logs:/app/logs/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8000)); print('ok')"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  mozaiksai_mongo_data:
  mozaiksai_keycloak_db:

