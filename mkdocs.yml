site_name: Mozaiks
site_description: Unified agentic stack — contracts, core runtime, and orchestration
site_url: https://docs.mozaiks.ai
edit_uri: ""

docs_dir: docs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BlocUnited-LLC/mozaiks
  generator: false

theme:
  name: material
  logo: assets/mozaik_logo.svg
  favicon: assets/mozaik.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - autorefs
  - minify:
      minify_html: true

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - AI-Assisted Setup: setup-prompt.md
  - Getting Started: getting-started.md
  - Adding a Workflow: guides/adding-a-workflow.md
  - Customizing Frontend:
      - Overview: guides/customizing-frontend/01-overview.md
      - Brand JSON: guides/customizing-frontend/02-brand-json.md
      - UI JSON: guides/customizing-frontend/03-ui-json.md
      - Assets: guides/customizing-frontend/04-assets.md
      - Wiring: guides/customizing-frontend/05-wiring.md
      - Auth JSON: guides/customizing-frontend/06-auth-json.md
  - Architecture:
      - Keycloak Auth: architecture/keycloak-auth.md
      - Frontend UI:
          - Overview: architecture/frontend/index.md
          - UI Surface Model: architecture/frontend/ui-surface-model.md
          - Conversation Modes: architecture/frontend/conversation-modes.md
          - Layout Modes: architecture/frontend/layout-modes.md
          - Persistent Widget: architecture/frontend/persistent-widget.md
          - Event-Driven State: architecture/frontend/event-driven-state.md
